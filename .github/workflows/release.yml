name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Type of version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      custom_version:
        description: 'Custom version (optional, overrides version_type)'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        lfs: true

    - name: Setup pixi
      uses: prefix-dev/setup-pixi@v0.9.4
      with:
        pixi-version: latest
        cache: false

    - name: Get current version
      id: current_version
      run: |
        $version = pixi run python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])"
        echo "version=$version" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Calculate new version
      id: new_version
      run: |
        $currentVersion = "${{ steps.current_version.outputs.version }}"
        $customVersion = "${{ github.event.inputs.custom_version }}"
        $versionType = "${{ github.event.inputs.version_type }}"

        if ($customVersion) {
            $newVersion = $customVersion
        } else {
            $parts = $currentVersion.Split('.')
            $major = [int]$parts[0]
            $minor = [int]$parts[1]
            $patch = [int]$parts[2]

            switch ($versionType) {
                "major" { $major++; $minor = 0; $patch = 0 }
                "minor" { $minor++; $patch = 0 }
                "patch" { $patch++ }
            }

            $newVersion = "$major.$minor.$patch"
        }

        echo "version=$newVersion" >> $env:GITHUB_OUTPUT
        echo "New version will be: $newVersion"
      shell: pwsh

    - name: Update version in pyproject.toml
      run: |
        $newVersion = "${{ steps.new_version.outputs.version }}"
        $content = Get-Content pyproject.toml -Raw
        $updated = $content -replace '(?m)^(version = "[^"]*")', "version = `"$newVersion`""
        Set-Content pyproject.toml -Value $updated -NoNewline
        echo "Updated version to $newVersion"
      shell: pwsh

    - name: Update version in pixi.toml
      run: |
        $newVersion = "${{ steps.new_version.outputs.version }}"
        $file = "pixi.toml"
        $content = Get-Content $file -Raw
        # Update version under [workspace] section only
        $content = $content -replace '(?ms)(^\[workspace\][^\[]*?^version = ")[^"]*(")', "`${1}$newVersion`$2"
        # Update version under [package] section only
        $content = $content -replace '(?ms)(^\[package\][^\[]*?^version = ")[^"]*(")', "`${1}$newVersion`$2"
        Set-Content $file -Value $content -NoNewline
        echo "Updated $file to version $newVersion"
      shell: pwsh

    - name: Update version in sparrow_rockfinch_version.hpp
      run: |
        $newVersion = "${{ steps.new_version.outputs.version }}"
        $parts = $newVersion.Split('.')
        $major = $parts[0]
        $minor = $parts[1]
        $patch = $parts[2]
        $file = "include/sparrow-rockfinch/config/sparrow_rockfinch_version.hpp"
        $content = Get-Content $file -Raw
        $content = $content -replace '(?m)^(\s*constexpr int SPARROW_ROCKFINCH_VERSION_MAJOR = )\d+(;)', "`${1}$major`$2"
        $content = $content -replace '(?m)^(\s*constexpr int SPARROW_ROCKFINCH_VERSION_MINOR = )\d+(;)', "`${1}$minor`$2"
        $content = $content -replace '(?m)^(\s*constexpr int SPARROW_ROCKFINCH_VERSION_PATCH = )\d+(;)', "`${1}$patch`$2"
        Set-Content $file -Value $content -NoNewline
        echo "Updated $file to version $newVersion"
      shell: pwsh

    - name: Build project
      run: pixi build

    - name: Run C++ tests
      run: pixi run test_cpp

    - name: Run Python tests
      run: pixi run test_python

    - name: Run integration tests
      run: pixi run test_integration

    - name: Commit version bump
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add pyproject.toml pixi.toml include/sparrow-rockfinch/config/sparrow_rockfinch_version.hpp
        git commit -m "Bump version to ${{ steps.new_version.outputs.version }}"

    - name: Create and push tag
      run: |
        $tag = "v${{ steps.new_version.outputs.version }}"
        git tag $tag
        git push origin main
        git push origin $tag
        echo "Created and pushed tag: $tag"
      shell: pwsh

    - name: Create GitHub Release
      uses: elgohr/Github-Release-Action@v5
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        title: Release v${{ steps.new_version.outputs.version }}
        tag: v${{ steps.new_version.outputs.version }}

